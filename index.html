<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Swamp</title>
    <link rel="stylesheet" href="" />
  </head>
  <body>
    <header>
      <style>
        header {
          background-color: #4caf50;
          color: #ffffff;
          padding: 20px;
          text-align: center;
          font-family: "Arial", sans-serif;
          font-size: 45px;
          border-radius: 30px;
        }

        nav a {
          color: #ffffff;
          text-decoration: none;
          margin: 0 10px;
          font-size: 40px;
        }

        nav a:hover {
          text-decoration: underline;
        }
      </style>
      <h1>Welcome to my Swamp</h1>
      <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#socials">Socials</a>
      </nav>
    </header>
    <section id="about">
      <h2 class="About">About Me</h2>
      <p class="About-text">Hello, I am Bullfrog, and welcome to my Swamp.</p>
      <style>
        .About {
          font-family: "Arial", sans-serif;
          font-size: 55px;
          color: #4caf50;
          text-align: left;
          margin-bottom: 20px;
          font-weight: bold;
        }

        .About-text {
          font-family: "Arial", sans-serif;
          font-size: 30px;
          color: #134615;
          text-align: left;
        }
      </style>
    </section>

    <section id="projects">
      <h2 class="Projects">Projects</h2>
      <p class="Project-text">
        I have yet to make meaningful projects, but stay tuned!
      </p>
      <style>
        .Projects {
          font-family: "Arial", sans-serif;
          font-size: 55px;
          color: #4caf50;
          text-align: center;
          margin-bottom: 20px;
          font-weight: bold;
        }
      </style>

      <style>
        .Project-text {
          font-family: "Arial", sans-serif;
          font-size: 30px;
          color: #134615;
          text-align: center;
        }
      </style>
    </section>

    <section id="socials">
      <h2 class="Socials">Socials</h2>
      <p class="Socials-text">Connect with me on social media.</p>
      <a href="https://www.youtube.com/@BullfrogEngineering" target="_blank"
        >YouTube</a
      >
      <a href="https://github.com/TheBullfrogEngineer" target="_blank"
        >GitHub</a
      >
      <a href="https://www.instagram.com/bullfrog_engineering" target="_blank"
        >Instagram</a
      >

      <style>
        .Socials {
          font-family: "Arial", sans-serif;
          font-size: 55px;
          color: #4caf50;
          text-align: right;
          margin-bottom: 20px;
          font-weight: bold;
        }

        .Socials-text {
          font-family: "Arial", sans-serif;
          font-size: 30px;
          color: #134615;
          text-align: right;
        }

        a {
          display: inline-block;
          margin-right: 10px;
          padding: 10px 20px;
          background-color: #4caf50;
          color: #ffffff;
          text-decoration: none;
          border-radius: 5px;
          transition: all 0.3s ease;
          font-family: "Arial", sans-serif;
          font-size: 20px;
        }

        a:hover {
          background-color: #134615;
          text-decoration: underline;
        }
      </style>
    </section>
  </body>
</html>
